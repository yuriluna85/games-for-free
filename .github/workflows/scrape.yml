name: Monitor de Jogos Grátis Scraper

on:
  schedule:
    # Roda diariamente às 16:01 UTC (que equivale a 13:01 no horário de Brasília - UTC-3)
    - cron: '1 16 * * *'
  workflow_dispatch: # Permite execução manual pelo painel do GitHub

permissions:
  contents: write # Necessário para permitir que o bot salve as atualizações de volta no repositório

jobs:
  scrape-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Código
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Instalar Dependências
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Executar Scraper e Indexador
        env:
          SERPER_API_KEY: ${{ secrets.SERPER_API_KEY }}
          SCRAPERAPI_KEY: ${{ secrets.SCRAPERAPI_KEY }}
        run: python monitor.py

      - name: Commit e Push das Atualizações
        run: |
          git config --global user.name "GitHub Action Bot"
          git config --global user.email "actions@github.com"
          git add index.html games.json games_data.csv games_metrics.json
          # Só faz commit se houver alguma alteração nos arquivos
          git diff --quiet && git diff --staged --quiet || (git commit -m "Auto-update: Jogos indexados em $(date +'%d/%m/%Y %H:%M')" && git pull --rebase origin main && git push origin main)
